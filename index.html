<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="reset.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activaciones en puertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="botones">
    <button onclick="openCamera()">Abrir Cámara</button>
    <button id="tomar-foto">Tomar Foto</button>
</div>
<div class="video">
    <video id="camera"></video>
</div>
<div class="foto">
    <canvas id="vista-previa"></canvas>
</div>
<script>
    // ocultamos el canvas y el botón de tomar foto
    document.getElementById("tomar-foto").style.display = "none";
    document.getElementById("vista-previa").style.display = "none";



    function openCamera() {
    // Comprobamos si el navegador soporta la API de cámara de la Web
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            // Pedimos permiso al usuario para acceder a la cámara
            navigator.mediaDevices.getUserMedia({ video: true }).then(function(stream) {
            // Si el permiso es concedido, abrimos la cámara
            var video = document.getElementById('camera');
            video.srcObject = stream;
            video.play();
    });
    }
    }
    var video = document.getElementById('camera');
    var canvas = document.getElementById('vista-previa');
    var context = canvas.getContext('2d');

    document.getElementById('tomar-foto').addEventListener('click', function(){
        context.drawImage(video, 0, 0, canvas.width, canvas.height)
    })

</script>    
</body>
</html>
