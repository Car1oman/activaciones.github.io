<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="stylesheet" href="reset.css">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activaciones en puertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="botones-foto" class="botones">
    <button id="abrir" class="boton" onclick="openCamera()">Abrir Cámara</button>
    <button class="boton" id="tomar-foto">Tomar Foto</button>
</div>
<div id="botones-enviar" class="botones">
    <button id="reintentar" class="boton" onclick="openCamera()">Reintentar</button>
    <button onclick="enviarFoto()" class="boton">Enviar Foto</button>
</div>
<div class="video">
    <video id="camera"></video>
</div>
<div class="foto">
    <canvas id="vista-previa"></canvas>
</div>

<script src="https://apis.google.com/js/api.js"></script>
<script>
    //AIzaSyAGhMGfb_sC1w41QrmD7DFD9rlEVsY3-xU
    //Iniciamos sesión
    gapi.load('client', function() {
        gapi.client.init({
            apiKey: 'AIzaSyAGhMGfb_sC1w41QrmD7DFD9rlEVsY3-xU',
            discoveryDocs: ['https://sheets.googleapis.com/$discovery/rest?version=v4'],
        }).then(function() {
            // La aplicación está lista para hacer llamadas a la API de Google Sheets.
        });
        });
    //Enviamos la foto a Sheets
    function enviarFoto() {
        // Obtén la foto como una cadena de datos
        var foto = canvas.toDataURL();
        // Obtén la fecha actual
        var fecha = new Date();
        // Añade la foto y la fecha a la hoja de cálculo
        gapi.client.sheets.spreadsheets.values.append({
            spreadsheetId: '1tIDeQnTikLnJl56W1kOpLioUGY-1hbKAvDg6rN6sW9I',
            range: 'Sheet1!A1:B1',  // asume que la hoja de cálculo tiene dos columnas: A para la fecha y B para la foto
            valueInputOption: 'RAW',
            insertDataOption: 'INSERT_ROWS',
            resource: {
            values: [[fecha, foto]]
            }
        }).then(function(response) {
            // La foto se ha enviado con éxito a la hoja de cálculo
        });
    }

    // ocultamos el canvas, boton de enviar y reintentar al cargar la pagina
    document.getElementById("botones-enviar").style.display = "none";
    document.getElementById("vista-previa").style.display = "none";



    function openCamera() {
    // Comprobamos si el navegador soporta la API de cámara de la Web
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            // Pedimos permiso al usuario para acceder a la cámara
            navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}}).then(function(stream) {
            // Si el permiso es concedido, abrimos la cámara
            var video = document.getElementById('camera');
            video.srcObject = stream;
            video.play();
            });
        }
    }
    var video = document.getElementById('camera');
    var canvas = document.getElementById('vista-previa');
    var context = canvas.getContext('2d');

    document.getElementById('tomar-foto').addEventListener('click', function(){
        document.getElementById("vista-previa").style.display = "block";
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        document.getElementById("camera").style.display = "none";
        document.getElementById("botones-foto").style.display = "none";
        document.getElementById("botones-enviar").style.display = "block";
    })

    document.getElementById('reintentar').addEventListener('click', function(){
        document.getElementById("vista-previa").style.display = "none";
        document.getElementById("camera").style.display = "block";
        document.getElementById("botones-foto").style.display = "block";
        document.getElementById("botones-enviar").style.display = "none";
        document.getElementById("abrir").style.display = "none";
    })

</script>    
</body>
</html>
